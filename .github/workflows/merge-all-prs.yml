# 열려있는 PR을 한 번에 전부 병합하고, 링크 교정 + 서버 배포까지 한다.
# 실행: GitHub 레포 → Actions 탭 → 왼쪽 "Merge all open PRs" → 오른쪽 "Run workflow" 버튼
# (자동으로 돌지 않는다. 버튼을 눌렀을 때만 실행된다.)
#
# ★ 2026-07-17: 배포·링크교정 단계를 이 안에 직접 넣었다.
#   왜: GITHUB_TOKEN 으로 만든 커밋은 다른 워크플로우를 깨우지 않는다(GitHub 무한루프 방지 정책).
#       그래서 이 워크플로우로 병합하면 deploy.yml 도 fix-blog-links.yml 도 안 돌았고,
#       병합된 글이 서버에 영원히 안 올라갔다.
#       실측(2026-07-17): 표지 있는 새 글 13편이 레포엔 있는데 라이브는 전부 404.
#       PR #700~707 을 01:43 에 병합했는데 deploy.yml 마지막 실행은 전날 23:57 이었다.
#       웹 UI 로 직접 병합한 PR(#695)은 지훈님 토큰이라 배포가 정상으로 돌았다 — 그래서 여태 안 들켰다.
name: Merge all open PRs

on:
  workflow_dispatch:        # 수동 실행 전용

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: merge-all-prs
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Merge every open PR (oldest first)
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -u
          # 열린 PR 번호를 오래된 순으로 가져온다(번호 오름차순 = 먼저 만든 것부터)
          PRS=$(gh pr list --repo "$REPO" --state open --limit 200 \
                 --json number --jq 'sort_by(.number) | .[].number')

          if [ -z "$PRS" ]; then
            echo "열린 PR이 없습니다."
            echo "merged=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "대상 PR: $(echo $PRS | tr '\n' ' ')"
          OK=0; FAIL=0; FAILED_LIST=""

          for N in $PRS; do
            echo "──────── PR #$N 병합 시도 ────────"
            # --merge: 머지 커밋 방식(기존 방식과 동일)
            # 충돌 등으로 실패해도 멈추지 않고 다음 PR로 넘어간다
            if gh pr merge "$N" --repo "$REPO" --merge; then
              echo "  ✅ #$N 병합 완료"
              OK=$((OK+1))
            else
              echo "  ⚠️ #$N 병합 실패(충돌·체크 대기 등) — 건너뜀"
              FAIL=$((FAIL+1)); FAILED_LIST="$FAILED_LIST #$N"
            fi
            sleep 3   # GitHub API 속도 제한 회피
          done

          echo ""
          echo "════════ 병합 결과 ════════"
          echo "  병합 성공: $OK 건"
          echo "  실패/건너뜀: $FAIL 건$FAILED_LIST"
          echo "  (실패한 PR은 GitHub 웹에서 개별 확인 — 보통 충돌 때문)"
          echo "merged=$OK" >> "$GITHUB_OUTPUT"

      # ── 아래부터가 신규. 병합만 하고 끝내면 서버에 안 올라간다 ──

      - name: 병합된 main 체크아웃
        if: steps.merge.outputs.merged != '0'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: 내부링크 교정 (fix_blog_links.py)
        if: steps.merge.outputs.merged != '0'
        run: |
          set -e
          sudo apt-get update -qq && sudo apt-get install -y -qq php-cli > /dev/null
          python3 .github/scripts/fix_blog_links.py --write

      - name: php -l 전수 검사 (깨진 글이 있으면 여기서 중단)
        if: steps.merge.outputs.merged != '0'
        run: |
          set -e
          ERR=0
          for f in *.php; do
            php -l "$f" > /dev/null 2>&1 || { echo "::error::PHP 문법 오류: $f"; ERR=1; }
          done
          [ "$ERR" -eq 0 ] || exit 1
          echo "전 파일 php -l 통과"

      - name: 교정분 커밋 (바뀐 게 있을 때만)
        if: steps.merge.outputs.merged != '0'
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "교정할 링크 없음 — 커밋 생략"
          else
            git add -A
            git commit -m "chore: 내부링크 자동 교정 (merge-all-prs)"
            git push
          fi

      - name: ★ FTP 배포 (이게 없으면 새 글이 서버에 안 올라간다)
        if: steps.merge.outputs.merged != '0'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /www/blog/
          dangerous-clean-slate: false
          log-level: minimal
          state-name: .ftp-deploy-sync-state.json
          exclude: |
            **/.github/**
            **/.git/**
            **/README.md
            **/site-root/**

      - name: 배포 검증 (라이브에서 실제로 열리는지)
        if: steps.merge.outputs.merged != '0'
        run: |
          set -e
          # 가장 최근 meta json 의 슬러그로 라이브를 눌러본다
          SLUG=$(ls -t meta/*.json 2>/dev/null | head -1 | xargs -r basename | sed 's/\.json$//')
          if [ -z "$SLUG" ]; then echo "meta 없음 — 검증 생략"; exit 0; fi
          echo "검증 대상: $SLUG"
          for i in 1 2 3 4 5 6; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' -L "https://btctiming.com/blog/$SLUG" --max-time 30 || echo 000)
            echo "  시도 $i: HTTP $CODE"
            [ "$CODE" = "200" ] && { echo "✅ 배포 확인"; exit 0; }
            sleep 10
          done
          echo "::error::배포 후에도 /blog/$SLUG 가 200 이 아닙니다"
          exit 1
