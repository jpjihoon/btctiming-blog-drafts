name: Score History Snapshot

# 8개 코인의 매수(long)/매도(short) 점수를 계산해 Firebase(scoreHistory/{coin}_{mode})에 저장한다.
# 실제 계산·저장은 서버의 snapshot.php가 담당하고, 이 워크플로우는 그 URL을 호출만 한다.
# (외부 크론 cron-job.org 도 같은 URL을 호출해 이중화 → 한쪽이 스킵돼도 구멍이 안 생김)

on:
  schedule:
    # 15분 간격. GitHub 무료 스케줄은 '정각·딱 떨어지는 분'에 부하가 몰려 스킵되기 쉬워
    # 어중간한 분(:07/:22/:37/:52)으로 분산한다. 그래도 간헐 스킵은 외부 크론이 커버.
    - cron: '7 * * * *'
    - cron: '22 * * * *'
    - cron: '37 * * * *'
    - cron: '52 * * * *'
  workflow_dispatch: {}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Call snapshot endpoint
        shell: bash
        env:
          SNAPSHOT_TOKEN: ${{ secrets.SNAPSHOT_TOKEN }}
        run: |
          set -uo pipefail
          echo "=== Score History Snapshot @ $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="

          if [ -z "${SNAPSHOT_TOKEN:-}" ]; then
            echo "ERROR: SNAPSHOT_TOKEN secret is not set (repo Settings > Secrets)."
            exit 1
          fi

          # snapshot.php 호출 (재시도 포함). 서버가 8코인×2모드를 계산·저장한다.
          resp=$(curl -fsS --max-time 120 --retry 2 --retry-delay 5 \
            "https://btctiming.com/snapshot.php?key=${SNAPSHOT_TOKEN}" 2>/dev/null) || {
              echo "snapshot call FAILED"; exit 1;
            }

          echo "$resp"
          # ok 개수 확인 (jq)
          ok=$(printf '%s' "$resp" | jq -r '.ok // 0' 2>/dev/null || echo 0)
          fail=$(printf '%s' "$resp" | jq -r '.fail // 0' 2>/dev/null || echo 0)
          echo "----------------------------------------"
          echo "Snapshot done: ok=$ok fail=$fail"
          # 일부 실패해도 워크플로우는 성공 처리 (다음 스케줄에 재시도)
          exit 0
