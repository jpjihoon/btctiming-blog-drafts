name: Deploy site root to Cafe24 (FTP)

on:
  push:
    branches: [main]
    paths:
      - 'site-root/**'
      # ★ 2026-07-15 추가: 이 워크플로우 파일 자신이 바뀌어도 배포가 돌게 한다.
      #   이게 없어서 사고가 났다.
      #   config.php 를 먼저 올리면 "옛날 워크플로우"가 돌아 config_secret.php 를 안 만들고,
      #   그 다음 워크플로우 파일을 올려도 .github/ 변경은 조건에 안 걸려 아예 안 돌았다.
      #   → 서버엔 새 config.php 만 있고 비밀번호 파일이 없어 snapshot.php 가 500.
      - '.github/workflows/deploy-root.yml'

  # ★ 2026-07-15 추가: Actions 탭에서 [Run workflow] 버튼으로 직접 돌릴 수 있게 한다.
  #   뭔가 꼬였을 때 파일을 안 고치고도 재배포할 수 있는 비상구.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────
      # 이 레포는 Public 이라 비밀번호(SNAPSHOT_TOKEN)를 파일에 적어두면
      # 전 세계에 공개된다. 그래서 레포에는 안 넣고,
      # GitHub Secrets(Public 레포에서도 아무도 못 봄)에 넣어두고
      # 배포하는 순간에만 꺼내서 config_secret.php 를 만들어 서버로 보낸다.
      # → 만들어진 파일은 서버에만 있고, 레포에는 영원히 남지 않는다.
      # ─────────────────────────────────────────────────────────
      - name: config_secret.php 생성 (레포에 커밋되지 않음)
        env:
          SNAPSHOT_TOKEN: ${{ secrets.SNAPSHOT_TOKEN }}
        run: |
          set -e
          if [ -z "$SNAPSHOT_TOKEN" ]; then
            echo "::error::SNAPSHOT_TOKEN 시크릿이 비어 있습니다. 레포 Settings → Secrets and variables → Actions 에서 등록/수정하세요."
            exit 1
          fi
          printf '<?php\nreturn [\n    "SNAPSHOT_TOKEN" => "%s",\n];\n' "$SNAPSHOT_TOKEN" > ./site-root/config_secret.php
          php -l ./site-root/config_secret.php
          echo "생성 완료: $(wc -c < ./site-root/config_secret.php) bytes / 토큰 길이 ${#SNAPSHOT_TOKEN}자"

      - name: FTP로 사이트 루트 업로드
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./site-root/
          server-dir: /www/
          dangerous-clean-slate: false
          log-level: verbose
          state-name: .ftp-deploy-sync-state-root.json

      # ★ 2026-07-15 추가: 배포가 실제로 먹었는지 서버에 물어본다.
      #   이번처럼 "배포는 성공했는데 실은 안 올라간" 상황을 여기서 잡는다.
      - name: 배포 검증 (비밀번호가 서버에 실제로 반영됐는지)
        env:
          SNAPSHOT_TOKEN: ${{ secrets.SNAPSHOT_TOKEN }}
        run: |
          sleep 10
          code=$(curl -s -o /tmp/r.txt -w '%{http_code}' --max-time 30 \
            "https://btctiming.com/cron_warmup.php?token=WRONG_TOKEN_ON_PURPOSE" || echo 000)
          echo "잘못된 토큰 응답: HTTP $code (403 이어야 정상)"
          if [ "$code" = "500" ]; then
            echo "::error::서버가 500 입니다. config_secret.php 가 서버에 없습니다. 배포 로그를 확인하세요."
            cat /tmp/r.txt
            exit 1
          fi
          if [ "$code" != "403" ] && [ "$code" != "429" ]; then
            echo "::warning::예상 밖 응답($code). 수동 확인 필요."
          else
            echo "✅ 서버가 비밀번호를 정상적으로 읽고 있습니다."
          fi
