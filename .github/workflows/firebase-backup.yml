name: Firebase Backup

# 매일 Firebase Realtime DB를 백업한다.
#  · scoreHistory (점수 히스토리, 민감정보 없음) → backups/ 폴더에 커밋(공개 레포 OK)
#  · 전체 스냅샷(messages·presence 포함, 개인정보 가능) → Actions 아티팩트로만 업로드(레포에 커밋 안 함)
# 읽기가 Firebase 규칙에 막히면 해당 노드는 건너뛰고 로그만 남긴다(워크플로우는 성공 처리).

on:
  schedule:
    - cron: '17 18 * * *'   # 매일 1회 (UTC 18:17 = KST 새벽 3:17, 트래픽 적은 시간)
  workflow_dispatch: {}

permissions:
  contents: write            # backups/ 커밋을 위해 필요

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Firebase 데이터 내려받기
        shell: bash
        env:
          FB_BASE: 'https://btctiming-chat-default-rtdb.asia-southeast1.firebasedatabase.app'
        run: |
          set -uo pipefail
          STAMP=$(date -u +%Y%m%d-%H%M%S)
          mkdir -p backups _full

          fetch_node () {
            local node="$1" out="$2"
            local code
            code=$(curl -sS -o "$out" -w '%{http_code}' --max-time 120 "${FB_BASE}/${node}.json") || code="000"
            if [ "$code" = "200" ] && [ -s "$out" ] && [ "$(cat "$out")" != "null" ]; then
              echo "  [$node] OK ($(wc -c < "$out") bytes)"
              return 0
            else
              echo "  [$node] 건너뜀 (HTTP $code — 규칙상 읽기 불가이거나 데이터 없음)"
              rm -f "$out"
              return 1
            fi
          }

          echo "== 공개 백업: scoreHistory =="
          # 점수 히스토리 — 압축해서 backups/에 (레포 용량 절약). 최신본은 latest로도 유지.
          if fetch_node "scoreHistory" "_full/scoreHistory.json"; then
            gzip -c "_full/scoreHistory.json" > "backups/scoreHistory-${STAMP}.json.gz"
            cp "_full/scoreHistory.json" "backups/scoreHistory-latest.json"
          fi

          echo "== 전체 스냅샷(아티팩트 전용): messages·presence·scoreHistory =="
          for n in messages presence scoreHistory; do
            fetch_node "$n" "_full/${n}.json" || true
          done
          # 전체를 하나의 아카이브로
          if ls _full/*.json >/dev/null 2>&1; then
            tar -czf "firebase-full-${STAMP}.tar.gz" -C _full .
            echo "FULL_ARCHIVE=firebase-full-${STAMP}.tar.gz" >> "$GITHUB_ENV"
          else
            echo "전체 스냅샷: 받은 노드 없음 (읽기 권한 확인 필요)"
          fi

          # 오래된 공개 백업 정리 — 최근 30개(.gz)만 유지
          ls -1t backups/scoreHistory-*.json.gz 2>/dev/null | tail -n +31 | xargs -r rm -f
          echo "정리 후 백업 파일 수: $(ls -1 backups/scoreHistory-*.json.gz 2>/dev/null | wc -l)"

      - name: 전체 스냅샷 아티팩트 업로드 (비공개, 보관 90일)
        if: env.FULL_ARCHIVE != ''
        uses: actions/upload-artifact@v4
        with:
          name: firebase-full-backup
          path: ${{ env.FULL_ARCHIVE }}
          retention-days: 90

      - name: scoreHistory 백업 커밋 (공개 레포)
        shell: bash
        run: |
          set -uo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain backups/)" ]; then
            git add backups/
            git commit -m "chore: firebase scoreHistory backup ($(date -u +%Y-%m-%d))"
            git push
            echo "백업 커밋 완료"
          else
            echo "변경 없음 — 커밋 생략"
          fi
