name: Firebase Backup

# 매일 Firebase Realtime DB의 scoreHistory(점수 히스토리)만 백업한다.
#  · backups/ 폴더에 gzip으로 커밋 (민감정보 없음 — 공개 레포 OK)
#  · messages·presence 등 사용자 데이터는 백업하지 않음(개인정보 보호)
# 읽기가 막히거나 데이터가 없으면 건너뛰고 워크플로우는 성공 처리.

on:
  schedule:
    - cron: '17 18 * * *'   # 매일 1회 (UTC 18:17 = KST 새벽 3:17)
  workflow_dispatch: {}

permissions:
  contents: write            # backups/ 커밋을 위해 필요

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v5

      - name: scoreHistory 내려받기
        shell: bash
        env:
          FB_BASE: 'https://btctiming-chat-default-rtdb.asia-southeast1.firebasedatabase.app'
        run: |
          set -uo pipefail
          STAMP=$(date -u +%Y%m%d-%H%M%S)
          mkdir -p backups

          code=$(curl -sS -o "scoreHistory.json" -w '%{http_code}' --max-time 120 "${FB_BASE}/scoreHistory.json") || code="000"
          if [ "$code" = "200" ] && [ -s "scoreHistory.json" ] && [ "$(cat scoreHistory.json)" != "null" ]; then
            echo "[scoreHistory] OK ($(wc -c < scoreHistory.json) bytes)"
            gzip -c "scoreHistory.json" > "backups/scoreHistory-${STAMP}.json.gz"
            cp "scoreHistory.json" "backups/scoreHistory-latest.json"
          else
            echo "[scoreHistory] 건너뜀 (HTTP $code — 읽기 불가이거나 데이터 없음)"
          fi

          # 오래된 백업 정리 — 최근 30개(.gz)만 유지
          ls -1t backups/scoreHistory-*.json.gz 2>/dev/null | tail -n +31 | xargs -r rm -f
          echo "정리 후 백업 파일 수: $(ls -1 backups/scoreHistory-*.json.gz 2>/dev/null | wc -l)"

      - name: 백업 커밋
        shell: bash
        run: |
          set -uo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain backups/)" ]; then
            git add backups/
            git commit -m "chore: firebase scoreHistory backup ($(date -u +%Y-%m-%d))"
            git push
            echo "백업 커밋 완료"
          else
            echo "변경 없음 — 커밋 생략"
          fi
