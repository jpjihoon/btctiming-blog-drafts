name: Deploy blog to Cafe24 (FTP)

# ★ 2026-07-17: workflow_dispatch 추가.
#   왜: 이 워크플로우는 push 로만 돌았다. 그런데 GITHUB_TOKEN 이 만든 커밋은
#       다른 워크플로우를 못 깨운다(GitHub 무한루프 방지 정책, 가이드 3.2).
#       그래서 "Merge all open PRs" 로 병합한 글 13편이 서버에 안 올라가 전부 404 였다.
#       그럴 때 Actions 탭에서 버튼 한 번으로 밀어넣을 수 있어야 한다.
#       (site-root 쪽 deploy-root.yml 은 이미 workflow_dispatch 가 있다)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: FTP로 업로드
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /www/blog/
          dangerous-clean-slate: false
          log-level: verbose
          state-name: .ftp-deploy-sync-state.json
          exclude: |
            **/.github/**
            **/.git/**
            **/README.md
            **/site-root/**

      - name: 배포 검증 (최신 글이 라이브에서 열리는지)
        run: |
          set -e
          SLUG=$(ls -t meta/*.json 2>/dev/null | head -1 | xargs -r basename | sed 's/\.json$//')
          if [ -z "$SLUG" ]; then echo "meta 없음 — 검증 생략"; exit 0; fi
          echo "검증 대상: $SLUG"
          for i in 1 2 3 4 5 6; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' -L "https://btctiming.com/blog/$SLUG" --max-time 30 || echo 000)
            echo "  시도 $i: HTTP $CODE"
            [ "$CODE" = "200" ] && { echo "배포 확인"; exit 0; }
            sleep 10
          done
          echo "::error::배포 후에도 /blog/$SLUG 가 200 이 아닙니다"
          exit 1
